<title>株式購入シミュレータ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Roboto+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111113;--surface:#1c1c1f;--surface2:#252528;
  --border:#2e2e32;--border2:#3a3a3f;
  --text:#e8e8ea;--text2:#8e8e96;--text3:#55555c;
  --green:#3ecf7a;--red:#f06060;--yellow:#c8bc7a;
  --mono:'Roboto Condensed',sans-serif;--r:10px;
}

/* ── 全体レイアウト：100vh固定 ── */
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;
  display:flex;flex-direction:column}

/* ヘッダー非表示 */
header{display:none}

/* タブバー */
.tab-bar{flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Noto Sans JP',sans-serif}
.tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}

/* ページコンテナ：残り高さをflexで分割 */
.pages{flex:1;overflow:hidden;position:relative}
.page{display:none;position:absolute;inset:0;flex-direction:column}
.page.active{display:flex}

/* ── 計算ページ ── */
.summary-fixed{flex-shrink:0;padding:8px 10px 6px;background:var(--bg)}
.summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-bottom:8px}
.summary-item{text-align:center}
.s-label{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.s-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text)}
.s-val.qty{font-size:22px}
.s-val.big{font-size:23px;color:var(--yellow)}
.divider{height:1px;background:var(--border);margin:8px 0}
.pnl-row{display:flex;align-items:flex-end;gap:10px}
.pnl-input-wrap{flex:1}
.pnl-input-wrap label{font-size:10px;color:var(--text3);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.pnl-input-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:7px;padding:6px 10px;font-family:var(--mono);font-size:17px;color:var(--text);
  outline:none;-webkit-appearance:none}
.pnl-result{flex:1;text-align:right}
.pnl-result .s-label{text-align:right}
.pnl-amount{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text)}
.pnl-pct{font-size:12px;margin-top:1px;color:var(--text2)}
.profit{color:var(--green)}.loss{color:var(--red)}
.tax-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.tax-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2)}
.tax-toggle input[type=checkbox]{accent-color:#aaa;width:14px;height:14px}
.tax-input-wrap{display:flex;align-items:center;gap:4px;flex:1}
.tax-input-wrap input{width:70px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:7px;padding:5px 8px;font-family:var(--mono);font-size:13px;
  outline:none;-webkit-appearance:none;color:var(--text);text-align:right}
.tax-after{font-family:var(--mono);font-size:25px;font-weight:500;margin-left:auto}

/* スクロールエリア */
.rows-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 10px 4px}
.rows-wrap{display:flex;flex-direction:column}
.row-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:5px 8px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.row-num{font-size:10px;color:var(--text3);font-weight:500;width:16px;text-align:center;flex-shrink:0}
.row-inputs{display:flex;gap:5px;flex-shrink:0}
.field{width:72px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:5px 6px;font-family:var(--mono);font-size:16px;color:var(--text);
  outline:none;-webkit-appearance:none;text-align:right}
.field input::placeholder{color:var(--text3)}
.subtotal-val{font-family:var(--mono);font-size:11px;color:var(--text3);flex:1;text-align:right;
  min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-actions{display:flex;gap:3px;flex-shrink:0;width:72px;justify-content:flex-end}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);
  font-size:12px;width:22px;height:24px;padding:0;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center}
.icon-btn.del:active{color:var(--red);border-color:var(--red)}
.insert-btn-wrap{display:flex;justify-content:center;margin-bottom:2px;margin-top:-1px}
.insert-btn{background:none;border:none;color:var(--text3);
  font-size:12px;padding:0 12px;cursor:pointer;font-family:var(--mono);line-height:1.2}

/* ツールバー */
.toolbar-fixed{flex-shrink:0;background:var(--bg);padding:6px 14px 20px;
  display:flex;justify-content:space-between;align-items:center}
.toolbar-right{display:flex;gap:6px}
.fab{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.fab:active{background:var(--border)}
.tool-btn{width:38px;height:38px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);
  color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.tool-btn:active{background:var(--surface2);color:var(--text)}
.tool-btn svg{width:18px;height:18px;fill:currentColor}

/* ── 保存ページ ── */
.saved-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.saved-header h2{font-size:14px;font-weight:600}
.saved-clear{background:none;border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text3);cursor:pointer}
.saved-clear:active{color:var(--red);border-color:var(--red)}
.saved-empty{text-align:center;padding:40px 0;color:var(--text3);font-size:13px}
.saved-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:13px 14px;margin-bottom:8px;touch-action:none;transition:opacity .15s,box-shadow .15s}
.saved-card.dragging{opacity:.4}
.saved-card.drag-over{box-shadow:0 0 0 2px var(--text2)}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;padding:0 6px 0 0;line-height:1;
  display:flex;align-items:center;user-select:none;-webkit-user-select:none}
.saved-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.saved-name{font-size:13px;font-weight:600;color:var(--text)}
.saved-actions{display:flex;gap:6px}
.saved-load{background:none;border:1px solid var(--border2);border-radius:6px;
  padding:4px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}
.saved-load:active{color:var(--text);background:var(--surface2)}
.saved-del{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:0 4px;line-height:1}
.saved-del:active{color:var(--red)}
.saved-vals{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.saved-val-item{text-align:center}
.saved-val-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.saved-val-num{font-family:var(--mono);font-size:13px;color:var(--text)}
.saved-val-num.profit{color:var(--green)}.saved-val-num.loss{color:var(--red)}

/* ── オーバーレイ ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;
  align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:20px 16px 16px;width:100%;max-width:320px}
.confirm-msg{font-size:14px;line-height:1.6;margin-bottom:16px;color:var(--text)}
.confirm-btns{display:flex;gap:8px}
.confirm-ok{flex:1;padding:11px;background:var(--text);color:var(--bg);border:none;
  border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:600;cursor:pointer}
.confirm-cancel{flex:1;padding:11px;background:none;border:1px solid var(--border2);
  border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}
.save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;
  align-items:flex-end;justify-content:center}
.save-overlay.open{display:flex}
.save-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px 16px 0 0;
  padding:20px 16px 36px;width:100%;max-width:480px}
.save-box h3{font-size:14px;font-weight:600;margin-bottom:12px}
.save-box input{width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;padding:11px 12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;
  color:var(--text);outline:none;-webkit-appearance:none;margin-bottom:12px}
.save-box-btns{display:flex;gap:8px}
.save-box-ok{flex:1;padding:13px;background:var(--text);color:var(--bg);border:none;
  border-radius:var(--r);font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:600;cursor:pointer}
.save-box-cancel{padding:13px 20px;background:none;border:1px solid var(--border2);
  border-radius:var(--r);font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--surface2);color:var(--text);border:1px solid var(--border2);
  padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;
  opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('calc',this)">計算</button>
  <button class="tab" onclick="showTab('saved',this)">保存</button>
</div>

<div class="pages">

  <!-- 計算ページ -->
  <div class="page active" id="page-calc">
    <div class="summary-fixed">
      <div class="summary">
        <div class="summary-grid">
          <div class="summary-item"><div class="s-label">平均単価</div><div class="s-val big" id="avg">—</div></div>
          <div class="summary-item"><div class="s-label">合計数量</div><div class="s-val qty" id="tot-qty">—</div></div>
          <div class="summary-item"><div class="s-label">合計金額</div><div class="s-val" id="tot-cost">—</div></div>
        </div>
        <div class="divider"></div>
        <div class="pnl-row">
          <div class="pnl-input-wrap">
            <label>現在値</label>
            <input type="number" inputmode="decimal" id="current-price" placeholder="" oninput="recalc()">
          </div>
          <div class="pnl-result">
            <div class="s-label">損益</div>
            <div class="pnl-amount" id="pnl-amt">—</div>
            <div class="pnl-pct" id="pnl-pct"></div>
          </div>
        </div>
        <div class="tax-row">
          <label class="tax-toggle"><input type="checkbox" id="tax-on" onchange="recalc()"> 税引後</label>
          <div class="tax-input-wrap">
            <input type="number" inputmode="decimal" id="tax-rate" value="20.315" oninput="recalc()">
            <span style="font-size:12px;color:var(--text3)">%</span>
            <span class="tax-after" id="pnl-after-tax"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="rows-scroll">
      <div class="rows-wrap" id="rows"></div>
    </div>

    <div class="toolbar-fixed">
      <div></div>
      <div class="toolbar-right">
        <!-- 上書き保存：フロッピーそのまま -->
        <button class="tool-btn" onclick="overwriteSave()" title="上書き保存">
          <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H7V5h8v4z"/></svg>
        </button>
        <!-- 新規保存：フロッピー＋右上に＋ -->
        <button class="tool-btn" onclick="promptSave()" title="新規保存" style="position:relative">
          <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H7V5h8v4z"/></svg>
          <span style="position:absolute;top:3px;right:3px;font-size:9px;font-weight:700;line-height:1;color:var(--text)">＋</span>
        </button>
        <button class="tool-btn" onclick="revertToLastSaved()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 保存ページ -->
  <div class="page" id="page-saved">
    <div class="saved-scroll">
      <div class="saved-header">
        <h2>保存済みパターン</h2>
        <button class="saved-clear" onclick="clearSaved()">全削除</button>
      </div>
      <div id="saved-list"></div>
    </div>
  </div>

</div>

<!-- 確認ダイアログ -->
<div class="overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-ok" id="confirm-ok">OK</button>
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 保存ダイアログ -->
<div class="save-overlay" id="save-overlay">
  <div class="save-box">
    <h3>パターン名を入力</h3>
    <input id="save-name-input" type="text" placeholder="">
    <div class="save-box-btns">
      <button class="save-box-ok" onclick="confirmSave()">保存</button>
      <button class="save-box-cancel" onclick="closeSaveDialog()">キャンセル</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
var rows=[{price:'',qty:''},{price:'',qty:''}];

function ceilVal(n,d){d=d||0;if(!isFinite(n)||isNaN(n))return null;var f=Math.pow(10,d);return Math.ceil(n*f)/f;}
function fmt(n,d){d=d||0;var v=ceilVal(n,d);if(v===null)return'—';if(Math.abs(v)>=1e8)return(v/1e8).toFixed(2)+'億';return v.toLocaleString('ja-JP',{maximumFractionDigits:d});}
function fmtFull(n,d){d=d||0;var v=ceilVal(n,d);if(v===null)return'—';return v.toLocaleString('ja-JP',{maximumFractionDigits:d});}
function fmtS(n){if(!isFinite(n)||isNaN(n))return'—';return(n>=0?'+':'')+fmtFull(n,0);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function calcTotals(){
  var cost=0,qty=0,valid=0;
  rows.forEach(function(r){var p=parseFloat(r.price),q=parseFloat(r.qty);if(isFinite(p)&&isFinite(q)&&p>0&&q>0){cost+=p*q;qty+=q;valid++;}});
  return{cost:cost,qty:qty,avg:valid>0&&qty>0?cost/qty:null};
}

function recalc(){
  var t=calcTotals();
  document.getElementById('avg').textContent=t.avg!==null?fmt(t.avg,0):'—';
  document.getElementById('tot-qty').textContent=t.qty>0?fmt(t.qty,0):'—';
  document.getElementById('tot-cost').textContent=t.cost>0?fmt(t.cost,0):'—';
  var cur=parseFloat(document.getElementById('current-price').value);
  var pnlAmtEl=document.getElementById('pnl-amt');
  var pnlPctEl=document.getElementById('pnl-pct');
  var pnlAfterEl=document.getElementById('pnl-after-tax');
  if(t.avg!==null&&isFinite(cur)&&t.qty>0){
    var pnl=(cur-t.avg)*t.qty;
    var pct=((cur-t.avg)/t.avg)*100;
    pnlAmtEl.textContent=fmtS(pnl); pnlAmtEl.className='pnl-amount';
    pnlPctEl.textContent=(pnl>=0?'+':'')+fmt(pct,2)+'%'; pnlPctEl.className='pnl-pct';
    var taxOn=document.getElementById('tax-on').checked;
    var taxRate=parseFloat(document.getElementById('tax-rate').value)/100;
    if(taxOn&&isFinite(taxRate)){
      if(pnl>0){pnlAfterEl.textContent='¥'+fmtFull(pnl*(1-taxRate),0);pnlAfterEl.className='tax-after profit';}
      else{pnlAfterEl.textContent='¥'+fmtFull(pnl*(1-taxRate),0);pnlAfterEl.className='tax-after loss';}
    }else{pnlAfterEl.textContent='';pnlAfterEl.className='tax-after';}
  }else{
    pnlAmtEl.textContent='—';pnlAmtEl.className='pnl-amount';
    pnlPctEl.textContent='';pnlAfterEl.textContent='';pnlAfterEl.className='tax-after';
  }
  document.querySelectorAll('.subtotal-val').forEach(function(el,i){
    var p=parseFloat(rows[i]&&rows[i].price),q=parseFloat(rows[i]&&rows[i].qty);
    el.textContent=(isFinite(p)&&isFinite(q)&&p>0&&q>0)?fmt(p*q,0):'—';
  });
}

function render(){
  var c=document.getElementById('rows');
  c.innerHTML='';
  c.appendChild(makeInsertBtn(0));
  rows.forEach(function(row,i){
    var d=document.createElement('div');
    d.className='row-item';
    var up=i>0?'<button class="icon-btn" onclick="moveRow('+i+',-1)">↑</button>':'<span style="width:22px;flex-shrink:0"></span>';
    var dn=i<rows.length-1?'<button class="icon-btn" onclick="moveRow('+i+',1)">↓</button>':'<span style="width:22px;flex-shrink:0"></span>';
    var dl=rows.length>1?'<button class="icon-btn del" onclick="deleteRow('+i+')">×</button>':'<span style="width:22px;flex-shrink:0"></span>';
    d.innerHTML='<span class="row-num">'+(i+1)+'</span>'
      +'<div class="row-inputs">'
        +'<div class="field"><input type="number" inputmode="decimal" placeholder="単価" value="'+escHtml(row.price)+'" oninput="rows['+i+'].price=this.value;recalc()"></div>'
        +'<div class="field"><input type="number" inputmode="decimal" placeholder="数量" value="'+escHtml(row.qty)+'" oninput="rows['+i+'].qty=this.value;recalc()"></div>'
      +'</div>'
      +'<span class="subtotal-val">—</span>'
      +'<div class="row-actions">'+up+dn+dl+'</div>';
    c.appendChild(d);
    c.appendChild(makeInsertBtn(i+1));
  });
  recalc();
}

function makeInsertBtn(idx){
  var w=document.createElement('div');w.className='insert-btn-wrap';
  var b=document.createElement('button');b.className='insert-btn';b.textContent='＋';
  b.onclick=function(){addRow(idx);};w.appendChild(b);return w;
}
function addRow(idx){
  if(idx===-1||idx>=rows.length)rows.push({price:'',qty:''});
  else rows.splice(idx,0,{price:'',qty:''});
  render();
}
function deleteRow(i){if(rows.length<=1)return;rows.splice(i,1);render();}
function moveRow(i,dir){var j=i+dir;if(j<0||j>=rows.length)return;var tmp=rows[i];rows[i]=rows[j];rows[j]=tmp;render();}

function showTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='saved')renderSaved();
}

var _confirmCb=null;
function askConfirm(msg,cb){
  _confirmCb=cb;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){_confirmCb=null;document.getElementById('confirm-overlay').classList.remove('open');}
document.getElementById('confirm-ok').addEventListener('click',function(){
  document.getElementById('confirm-overlay').classList.remove('open');
  if(_confirmCb){var f=_confirmCb;_confirmCb=null;f();}
});

var lastSavedId=null;

function overwriteSave(){
  if(!lastSavedId){showToast('上書き先がありません。先に新規保存してください');return;}
  var s=getSaved();
  var idx=-1;
  for(var i=0;i<s.length;i++){if(s[i].id===lastSavedId){idx=i;break;}}
  if(idx===-1){showToast('上書き先が見つかりません');return;}
  var e=s[idx];
  askConfirm('「'+e.name+'」に上書き保存しますか？',function(){
    var t=calcTotals();
    var cur=parseFloat(document.getElementById('current-price').value);
    var taxOn=document.getElementById('tax-on').checked;
    var taxRate=parseFloat(document.getElementById('tax-rate').value);
    var pnl=(isFinite(cur)&&t.qty>0)?(cur-t.avg)*t.qty:null;
    var afterTax=(taxOn&&pnl!==null&&pnl>0&&isFinite(taxRate))?pnl*(1-taxRate/100):null;
    s[idx]=Object.assign({},s[idx],{
      avg:t.avg,qty:t.qty,cost:t.cost,
      cur:isFinite(cur)?cur:null,pnl:pnl,afterTax:afterTax,
      taxOn:taxOn,taxRate:isFinite(taxRate)?taxRate:20.315,
      rows:JSON.parse(JSON.stringify(rows))
    });
    setSaved(s);
    setLastSavedId(lastSavedId);
    showToast('「'+e.name+'」を上書きしました');
  });
}

function promptSave(){
  document.getElementById('save-name-input').value='';
  document.getElementById('save-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('save-name-input').focus();},100);
}
function closeSaveDialog(){document.getElementById('save-overlay').classList.remove('open');}
function confirmSave(){
  var name=document.getElementById('save-name-input').value.trim()||'パターン '+(getSaved().length+1);
  var t=calcTotals();
  var cur=parseFloat(document.getElementById('current-price').value);
  var taxOn=document.getElementById('tax-on').checked;
  var taxRate=parseFloat(document.getElementById('tax-rate').value);
  var pnl=(isFinite(cur)&&t.qty>0)?(cur-t.avg)*t.qty:null;
  var afterTax=(taxOn&&pnl!==null&&pnl>0&&isFinite(taxRate))?pnl*(1-taxRate/100):null;
  var s=getSaved();
  s.push({id:''+Date.now(),name:name,avg:t.avg,qty:t.qty,cost:t.cost,
    cur:isFinite(cur)?cur:null,pnl:pnl,afterTax:afterTax,
    taxOn:taxOn,taxRate:isFinite(taxRate)?taxRate:20.315,
    rows:JSON.parse(JSON.stringify(rows))});
  setSaved(s);setLastSavedId(s[s.length-1].id);closeSaveDialog();showToast('「'+name+'」を保存しました');
}

function getSaved(){try{return JSON.parse(localStorage.getItem('sim_v2')||'[]');}catch(e){return[];}}
function setSaved(s){try{localStorage.setItem('sim_v2',JSON.stringify(s));}catch(e){}}

function renderSaved(){
  var s=getSaved();
  var el=document.getElementById('saved-list');
  if(!s.length){el.innerHTML='<div class="saved-empty">保存されたパターンがありません</div>';return;}
  el.innerHTML=s.map(function(e){
    return '<div class="saved-card" data-id="'+e.id+'">'
      +'<div class="saved-card-header">'
        +'<div style="display:flex;align-items:center;min-width:0">'
          +'<span class="drag-handle">⠿</span>'
          +'<span class="saved-name">'+escHtml(e.name)+'</span>'
        +'</div>'
        +'<div class="saved-actions">'
          +'<button class="saved-load" onclick="loadSaved(\''+e.id+'\')">読込</button>'
          +'<button class="saved-del" onclick="delSaved(\''+e.id+'\')">×</button>'
        +'</div>'
      +'</div>'
      +'<div class="saved-vals">'
        +'<div class="saved-val-item"><div class="saved-val-label">平均単価</div><div class="saved-val-num">'+fmt(e.avg,0)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">合計数量</div><div class="saved-val-num">'+fmt(e.qty,0)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">損益</div><div class="saved-val-num">'+fmtS(e.pnl)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">税引後</div><div class="saved-val-num '+(e.afterTax===null?'':e.afterTax>=0?'profit':'loss')+'">'+(e.afterTax!==null?fmtS(e.afterTax):'—')+'</div></div>'
      +'</div>'
    +'</div>';
  }).join('');
  initDrag();
}

/* ── ドラッグ＆ドロップ（タッチ対応） ── */
function initDrag(){
  var list=document.getElementById('saved-list');
  var dragging=null,startY=0,startIdx=0;

  list.querySelectorAll('.drag-handle').forEach(function(handle){
    handle.addEventListener('touchstart',onTouchStart,{passive:false});
    handle.addEventListener('mousedown',onMouseDown);
  });

  function cardIndex(card){
    var cards=list.querySelectorAll('.saved-card');
    for(var i=0;i<cards.length;i++){if(cards[i]===card)return i;}
    return -1;
  }

  function onMouseDown(e){
    var card=e.target.closest('.saved-card');
    if(!card)return;
    dragging=card;
    startY=e.clientY;
    startIdx=cardIndex(card);
    card.classList.add('dragging');
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);
  }
  function onMouseMove(e){
    if(!dragging)return;
    var cards=list.querySelectorAll('.saved-card');
    var over=document.elementFromPoint(e.clientX,e.clientY);
    if(over){var target=over.closest('.saved-card');
      if(target&&target!==dragging){
        cards.forEach(function(c){c.classList.remove('drag-over');});
        target.classList.add('drag-over');
      }
    }
  }
  function onMouseUp(e){
    if(!dragging)return;
    var over=document.elementFromPoint(e.clientX,e.clientY);
    if(over){var target=over.closest('.saved-card');
      if(target&&target!==dragging)moveCard(dragging,target);
    }
    finishDrag();
    document.removeEventListener('mousemove',onMouseMove);
    document.removeEventListener('mouseup',onMouseUp);
  }

  function onTouchStart(e){
    var card=e.target.closest('.saved-card');
    if(!card)return;
    e.preventDefault();
    dragging=card;
    startY=e.touches[0].clientY;
    card.classList.add('dragging');
    document.addEventListener('touchmove',onTouchMove,{passive:false});
    document.addEventListener('touchend',onTouchEnd);
  }
  function onTouchMove(e){
    if(!dragging)return;
    e.preventDefault();
    var t=e.touches[0];
    var cards=list.querySelectorAll('.saved-card');
    var over=document.elementFromPoint(t.clientX,t.clientY);
    if(over){var target=over.closest('.saved-card');
      if(target&&target!==dragging){
        cards.forEach(function(c){c.classList.remove('drag-over');});
        target.classList.add('drag-over');
      }
    }
  }
  function onTouchEnd(e){
    if(!dragging)return;
    var t=e.changedTouches[0];
    var over=document.elementFromPoint(t.clientX,t.clientY);
    if(over){var target=over.closest('.saved-card');
      if(target&&target!==dragging)moveCard(dragging,target);
    }
    finishDrag();
    document.removeEventListener('touchmove',onTouchMove);
    document.removeEventListener('touchend',onTouchEnd);
  }

  function moveCard(from,to){
    var s=getSaved();
    var fromId=from.dataset.id,toId=to.dataset.id;
    var fi=-1,ti=-1;
    for(var i=0;i<s.length;i++){
      if(s[i].id===fromId)fi=i;
      if(s[i].id===toId)ti=i;
    }
    if(fi===-1||ti===-1)return;
    var item=s.splice(fi,1)[0];
    s.splice(ti,0,item);
    setSaved(s);
    renderSaved();
  }

  function finishDrag(){
    if(dragging)dragging.classList.remove('dragging');
    list.querySelectorAll('.saved-card').forEach(function(c){c.classList.remove('drag-over');});
    dragging=null;
  }
}

function loadSaved(id){
  var s=getSaved(),e=null;
  for(var i=0;i<s.length;i++){if(s[i].id===id){e=s[i];break;}}
  if(!e)return;
  askConfirm('「'+e.name+'」を読み込みますか？',function(){
    rows=JSON.parse(JSON.stringify(e.rows));
    lastSavedId=e.id;setLastSavedId(e.id);
    document.getElementById('current-price').value=e.cur!==null?e.cur:'';
    document.getElementById('tax-on').checked=!!e.taxOn;
    document.getElementById('tax-rate').value=e.taxRate||20.315;
    render();
    showTab('calc',document.querySelectorAll('.tab')[0]);
    showToast('読み込みました');
  });
}
function delSaved(id){
  askConfirm('このパターンを削除しますか？',function(){
    setSaved(getSaved().filter(function(e){return e.id!==id;}));renderSaved();
  });
}
function clearSaved(){
  askConfirm('全て削除しますか？',function(){setSaved([]);renderSaved();});
}
function setLastSavedId(id){
  lastSavedId=id;
  try{localStorage.setItem('sim_last_id',id||'');}catch(e){}
}

function revertToLastSaved(){
  if(!lastSavedId){showToast('先に保存してください');return;}
  var s=getSaved();
  var e=null;
  for(var i=0;i<s.length;i++){if(s[i].id===lastSavedId){e=s[i];break;}}
  if(!e){showToast('保存データが見つかりません');return;}
  askConfirm('「'+e.name+'」の保存時の状態に戻しますか？',function(){
    rows=JSON.parse(JSON.stringify(e.rows));
    document.getElementById('current-price').value=e.cur!==null?e.cur:'';
    document.getElementById('tax-on').checked=!!e.taxOn;
    document.getElementById('tax-rate').value=e.taxRate||20.315;
    render();showToast('「'+e.name+'」に戻しました');
  });
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

try{var _lid=localStorage.getItem('sim_last_id');if(_lid)lastSavedId=_lid;}catch(e){}

// 起動時：lastSavedIdのパターンを復元
if(lastSavedId){
  try{
    var _s=getSaved();
    for(var _i=0;_i<_s.length;_i++){
      if(_s[_i].id===lastSavedId){
        var _e=_s[_i];
        rows=JSON.parse(JSON.stringify(_e.rows));
        document.getElementById('current-price').value=_e.cur!==null?_e.cur:'';
        document.getElementById('tax-on').checked=!!_e.taxOn;
        document.getElementById('tax-rate').value=_e.taxRate||20.315;
        break;
      }
    }
  }catch(e){}
}

render();
</script>
