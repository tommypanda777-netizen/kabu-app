<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111111;--surface:#1c1c1c;--surface2:#252525;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#e8e8ea;--text2:#8e8e96;--text3:#55555c;
  --green:#3ecf7a;--red:#f06060;
  --mono:'Roboto Condensed',sans-serif;--r:10px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;display:flex;flex-direction:column}
header{display:none}
.tab-bar{flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans JP',sans-serif}
.tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.pages{flex:1;overflow:hidden;position:relative}
.page{display:none;position:absolute;inset:0;flex-direction:column}
.page.active{display:flex}

/* サマリー */
.summary-fixed{flex-shrink:0;padding:8px 10px 6px;background:var(--bg)}
.summary{border-radius:var(--r);padding:10px}
.summary .s-label{color:#888890}
.summary .pnl-input-wrap label{color:#888890}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-bottom:8px}
.summary-item{text-align:center}
.s-label{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.s-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text)}
.divider{height:1px;background:var(--divider-color,var(--border));margin-top:var(--divider-margin-top,8px);margin-bottom:var(--divider-margin-bottom,8px)}
.pnl-row{display:flex;flex-direction:column;gap:3px}
.pnl-label-row{display:flex;align-items:center;gap:6px;margin-bottom:var(--pnl-label-margin,0px)}
.price-inputs-labels{flex:0 0 auto;display:flex;gap:4px}
.pnl-result-label{flex:1;text-align:right}
.pnl-inputs-row{display:flex;align-items:center;gap:6px}
.pnl-amount-wrap{flex:1;text-align:right}
.pnl-pct-row{text-align:right;margin-top:var(--pnl-pct-margin,0px)}
.price-inputs{flex:0 0 auto;display:flex;gap:4px}
.price-input-wrap{width:90px;display:flex;flex-direction:column;gap:3px}
.price-label-row{display:flex;align-items:center}
.radio-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.radio-toggle input[type=radio]{display:none}
.rb-box{width:12px;height:12px;border-radius:50%;border:1px solid #444;background:#111111;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rb-box::after{content:'';display:none;width:6px;height:6px;border-radius:50%;background:#aaa}
.radio-toggle input[type=radio]:checked + .rb-box{border-color:#aaa}
.radio-toggle input[type=radio]:checked + .rb-box::after{display:block}
.price-input-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 6px;font-family:var(--mono);outline:none;-webkit-appearance:none;text-align:right}
.pnl-amount{font-family:var(--mono);font-weight:500;color:var(--text)}
.pnl-pct{font-size:var(--pnl-pct-size,12px);color:var(--pnl-pct-color,#8e8e96)}
.profit{color:var(--green)}.loss{color:var(--red)}
.tax-row{display:flex;align-items:center;gap:10px;margin-top:var(--tax-row-margin,8px)}
.tax-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2)}
.tax-toggle input[type=checkbox]{display:none}
.tax-toggle .cb-box{width:14px;height:14px;border-radius:3px;border:1px solid #444;background:#111111;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tax-toggle input[type=checkbox]:checked + .cb-box{background:#aaa;border-color:#aaa}
.tax-toggle .cb-box::after{content:'';display:none;width:8px;height:5px;border-left:2px solid #111;border-bottom:2px solid #111;transform:rotate(-45deg) translateY(-1px)}
.tax-toggle input[type=checkbox]:checked + .cb-box::after{display:block}
.tax-input-wrap{display:flex;align-items:center;gap:4px;flex:1}
.tax-input-wrap input{width:70px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 8px;font-family:var(--mono);font-size:13px;outline:none;-webkit-appearance:none;color:var(--text);text-align:right}
.tax-after{font-family:var(--mono);font-weight:500;margin-left:auto}

/* 計算行 */
.rows-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 10px 4px}
.rows-wrap{display:flex;flex-direction:column}
.row-item{border-radius:var(--r);padding:5px 0px 5px 8px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.row-num{font-size:10px;color:var(--text3);font-weight:500;width:16px;text-align:center;flex-shrink:0}
.row-inputs{display:flex;gap:5px;flex-shrink:0}
.field{width:72px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 6px;font-family:var(--mono);color:var(--text);outline:none;-webkit-appearance:none;text-align:right}
.field input::placeholder{color:var(--text3)}
.subtotal-val{font-family:var(--mono);color:var(--text3);flex:1;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-actions{display:flex;gap:3px;flex-shrink:0;align-items:center}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:12px;width:22px;height:24px;padding:0;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.icon-btn.del:active{color:var(--red);border-color:var(--red)}
.row-drag-handle{color:var(--text3);font-size:16px;cursor:grab;width:22px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;-webkit-user-select:none;touch-action:none}
.row-item.row-dragging{opacity:.4}
.row-item.row-drag-over{box-shadow:0 0 0 2px var(--text2)}
.insert-btn-wrap{display:flex;justify-content:center;margin-bottom:2px;margin-top:-1px}
.insert-btn{background:none;border:none;color:var(--text3);font-size:12px;padding:0 12px;cursor:pointer;font-family:var(--mono);line-height:1.2}

/* ツールバー */
.toolbar-fixed{flex-shrink:0;background:var(--bg);padding:6px 14px 20px;display:flex;justify-content:space-between;align-items:center}
.toolbar-right{display:flex;gap:6px;align-items:center}
.tool-btn{width:30px;height:30px;border-radius:7px;background:var(--surface);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.tool-btn:active{background:var(--surface2);color:var(--text)}
.tool-btn svg{width:18px;height:18px;fill:currentColor}
.gear-btn{width:30px;height:30px;border-radius:7px;background:var(--surface);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.gear-btn:active{background:var(--surface2);color:var(--text)}
.gear-btn svg{width:18px;height:18px;fill:currentColor}

/* 保存ページ */
.saved-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.saved-header h2{font-size:14px;font-weight:600}
.saved-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text3);cursor:pointer}
.saved-clear:active{color:var(--red);border-color:var(--red)}
.saved-empty{text-align:center;padding:40px 0;color:var(--text3);font-size:13px}
.saved-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;touch-action:none;transition:opacity .15s,box-shadow .15s}
.saved-card.dragging{opacity:.4}
.saved-card.drag-over{box-shadow:0 0 0 2px var(--text2)}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;padding:0 6px 0 0;line-height:1;display:flex;align-items:center;user-select:none;-webkit-user-select:none}
.saved-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.saved-name{font-size:13px;font-weight:600;color:var(--text)}
.saved-actions{display:flex;gap:6px}
.saved-load{background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}
.saved-load:active{color:var(--text);background:var(--surface2)}
.saved-del{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:0 4px;line-height:1}
.saved-del:active{color:var(--red)}
.saved-vals{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.saved-val-item{text-align:center}
.saved-val-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.saved-val-num{font-family:var(--mono);font-size:13px;color:var(--text)}
.saved-val-num.profit{color:var(--green)}.saved-val-num.loss{color:var(--red)}

/* オーバーレイ共通 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px 16px 16px;width:100%;max-width:320px}
.confirm-msg{font-size:14px;line-height:1.6;margin-bottom:16px;color:var(--text)}
.confirm-btns{display:flex;gap:8px}
.confirm-ok{flex:1;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:600;cursor:pointer}
.confirm-cancel{flex:1;padding:11px;background:none;border:1px solid var(--border2);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}
.save-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-end;justify-content:center}
.save-overlay.open{display:flex}
.save-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:480px}
.save-box h3{font-size:14px;font-weight:600;margin-bottom:12px}
.save-box input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:11px 12px;font-size:15px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;-webkit-appearance:none;margin-bottom:12px}
.save-box-btns{display:flex;gap:8px}
.save-box-ok{flex:1;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:600;cursor:pointer}
.save-box-cancel{padding:13px 20px;background:none;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text2);cursor:pointer}

/* ── 設定パネル ── */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600}
.settings-overlay.open{display:block}
.settings-panel{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--surface);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;z-index:601;display:flex;flex-direction:column}
.settings-panel.open{display:flex}
.settings-panel:not(.open){display:none}
.settings-header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.settings-header h2{font-size:15px;font-weight:600}
.settings-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.settings-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 40px}
.settings-reset{width:100%;margin-top:16px;padding:12px;background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.settings-reset:active{color:var(--red);border-color:var(--red)}

/* 設定セクション */
.cfg-section{margin-bottom:16px}
.cfg-section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.cfg-row:last-child{border-bottom:none}
.cfg-label{font-size:13px;color:var(--text2)}
.cfg-controls{display:flex;align-items:center;gap:8px}

/* サイズスライダー */
.cfg-size{display:flex;align-items:center;gap:8px}
.cfg-size input[type=range]{width:100px;accent-color:#aaa;height:3px}
.cfg-size-val{font-family:var(--mono);font-size:12px;color:var(--text2);width:28px;text-align:right}

/* カラーピッカー */
.cfg-color{width:32px;height:28px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;padding:0;-webkit-appearance:none;appearance:none;background:none}
.cfg-color::-webkit-color-swatch-wrapper{padding:2px}
.cfg-color::-webkit-color-swatch{border-radius:4px;border:none}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* ノート */
/* ノート */
.note-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 4px}
.note-grid{display:flex;flex-direction:column;gap:8px}
.note-card{border-radius:10px;overflow:hidden}
.note-card-editor{outline:none;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;line-height:1.7;padding:10px 12px;word-break:break-word;-webkit-user-modify:read-write-plaintext-only;width:100%;display:block;overflow-y:auto;-webkit-overflow-scrolling:touch;box-sizing:border-box}
.note-card-editor:empty::before{content:'メモ...';opacity:.35;pointer-events:none}
.note-footer{flex-shrink:0;background:var(--bg);padding:6px 14px 20px;display:flex;justify-content:flex-end;align-items:center}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('calc',this)">計算</button>
  <button class="tab" onclick="showTab('saved',this)">保存</button>
  <button class="tab" onclick="showTab('note',this)">ノート</button>
</div>

<div class="pages">
  <!-- 計算ページ -->
  <div class="page active" id="page-calc">
    <div class="summary-fixed">
      <div class="summary" id="summary-card">
        <div class="summary-grid">
          <div class="summary-item" id="item-avg" style="transform:translateY(var(--avg-offset-y,-5px)) translateX(var(--avg-offset-x,0px))"><div class="s-label">平均単価</div><div class="s-val" id="avg">—</div></div>
          <div class="summary-item" id="item-qty" style="transform:translateY(var(--qty-offset-y,-5px)) translateX(var(--qty-offset-x,0px))"><div class="s-label">合計数量</div><div class="s-val" id="tot-qty">—</div></div>
          <div class="summary-item" id="item-cost" style="transform:translateY(var(--cost-offset-y,-5px));text-align:right"><div class="s-label" id="cost-label">合計金額</div><div class="s-val" id="tot-cost">—</div><div class="s-label" id="margin-label" style="margin-top:var(--margin-label-gap,5px);transform:translateY(var(--margin-label-offset-y,0px))">余力</div><div class="s-val" id="margin-val" style="display:block;transform:translateY(var(--margin-offset-y,0px))">—</div></div>
        </div>
        <div class="divider"></div>
        <div class="pnl-row">
          <!-- ラベル行 -->
          <div class="pnl-label-row">
            <div class="price-inputs-labels">
              <div class="price-input-wrap">
                <label class="radio-toggle" onclick="setPriceMode('current')">
                  <input type="radio" name="price-mode" id="radio-current" value="current" checked>
                  <span class="rb-box"></span>
                  <span class="price-label-txt" id="label-current">現在値</span>
                </label>
              </div>
              <div class="price-input-wrap">
                <label class="radio-toggle" onclick="setPriceMode('target')">
                  <input type="radio" name="price-mode" id="radio-target" value="target">
                  <span class="rb-box"></span>
                  <span class="price-label-txt" id="label-target">目標値</span>
                </label>
              </div>
            </div>
            <div class="pnl-result-label">
              <div class="s-label" style="text-align:right">損益</div>
            </div>
          </div>
          <!-- 入力・金額行（センター揃え） -->
          <div class="pnl-inputs-row">
            <div class="price-inputs">
              <div class="price-input-wrap">
                <input type="number" inputmode="decimal" id="current-price" placeholder="" oninput="recalc()">
              </div>
              <div class="price-input-wrap">
                <input type="number" inputmode="decimal" id="target-price" placeholder="" oninput="recalc()">
              </div>
            </div>
            <div class="pnl-amount-wrap">
              <div class="pnl-amount" id="pnl-amt">—</div>
            </div>
          </div>
          <!-- パーセンテージ行 -->
          <div class="pnl-pct-row">
            <div class="pnl-pct" id="pnl-pct"></div>
          </div>
        </div>
        <div class="tax-row">
          <label class="tax-toggle" style="transform:translateY(var(--after-tax-offset-y,0px))"><input type="checkbox" id="tax-on" onchange="recalc()"><span class="cb-box"></span> 税引後</label>
          <input type="number" id="tax-rate" style="display:none" value="20.315">
          <span id="pnl-after-tax-wrap" style="margin-left:auto;display:inline-flex;align-items:center;transform:translateY(var(--after-tax-offset-y,0px))">
            <span class="tax-after" id="pnl-after-tax"></span>
          </span>
        </div>
      </div>
    </div>
    <div class="rows-scroll" id="rows-scroll">
      <div class="rows-wrap" id="rows"></div>
    </div>
    <div class="toolbar-fixed" id="toolbar-fixed">
      <!-- 左：ボタン群 -->
      <div class="toolbar-right">
        <button class="gear-btn" onclick="openSettings()">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
        <button class="tool-btn" onclick="revertToLastSaved()">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button class="tool-btn" onclick="promptSave()" title="新規保存">
          <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H7V5h8v4z"/></svg>
          <span style="position:absolute;top:3px;right:3px;font-size:9px;font-weight:700;line-height:1;color:var(--text)">＋</span>
        </button>
        <button class="tool-btn" onclick="overwriteSave()" title="上書き保存">
          <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm3-10H7V5h8v4z"/></svg>
        </button>
      </div>
      <!-- 右：資産合計（ラベルは絶対配置で数字の上に乗せる） -->
      <div style="position:relative;display:flex;align-items:center;justify-content:flex-end">
        <div id="asset-label" style="font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;position:absolute;top:var(--asset-label-top,-19px);right:0;white-space:nowrap">資産合計</div>
        <div id="asset-total" style="font-family:var(--mono);font-weight:500;line-height:1;text-align:right">—</div>
      </div>
    </div>
  </div>

  <!-- 保存ページ -->
  <div class="page" id="page-saved">
    <div class="saved-scroll">
      <div class="saved-header">
        <h2>保存済みパターン</h2>
        <button class="saved-clear" onclick="clearSaved()">全削除</button>
      </div>
      <div id="saved-list"></div>
    </div>
  </div>

  <!-- ノートページ -->
  <div class="page" id="page-note">
    <div class="note-scroll" id="note-scroll">
      <div class="note-grid" id="note-grid"></div>
    </div>
    <div class="note-footer">
      <button class="gear-btn" onclick="openNoteSettings()">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.01 7.01 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.04.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-ok" id="confirm-ok">OK</button>
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 保存ダイアログ -->
<div class="save-overlay" id="save-overlay">
  <div class="save-box">
    <h3>パターン名を入力</h3>
    <input id="save-name-input" type="text" placeholder="">
    <div class="save-box-btns">
      <button class="save-box-ok" onclick="confirmSave()">保存</button>
      <button class="save-box-cancel" onclick="closeSaveDialog()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ノート設定パネル -->
<div class="settings-overlay" id="note-settings-overlay" onclick="closeNoteSettings()"></div>
<div class="settings-panel" id="note-settings-panel">
  <div class="settings-header">
    <h2>ノート設定</h2>
    <button class="settings-close" onclick="closeNoteSettings()">×</button>
  </div>
  <div class="settings-body" id="note-settings-body"></div>
</div>

<!-- 設定パネル -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <h2>設定</h2>
    <button class="settings-close" onclick="closeSettings()">×</button>
  </div>
  <div class="settings-body" id="settings-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
var rows=[{price:'',qty:''},{price:'',qty:''}];

/* ── デフォルト設定 ── */
var DEFAULTS={
  // 文字色
  colorAvg:'#ffffc8',
  colorQty:'#e8e8ea',
  colorCost:'#e8e8ea',
  colorCostWarn:'#000000',
  colorPnl:'#e8e8ea',
  colorPnlPct:'#8e8e96',
  sizePnlPct:10,
  colorAfterTax:'#f06060',
  colorAfterTaxMinus:'#3ecf7a',
  colorTaxLabel:'#8e8e96',
  sizeTaxLabel:10,
  colorInput:'#e8e8ea',
  colorInputOff:'#3a3a3a',
  colorTarget:'#e8e8ea',
  colorTargetOff:'#3a3a3a',
  colorSubtotal:'#55555c',
  colorRowInput:'#e8e8ea',
  colorRowPctPlus:'#3ecf7a',
  colorRowPctMinus:'#f06060',
  colorMargin:'#e8e8ea',
  colorMarginLabel:'#8e8e96',
  colorMax:'#444455',
  colorAsset:'#ffffc8',
  colorAssetLabel:'#8e8e96',
  // 文字サイズ
  sizeAvg:26,
  sizeQty:26,
  sizeCost:26,
  sizePnl:26,
  sizeAfterTax:26,
  sizeInput:18,
  sizeTarget:18,
  sizeSubtotal:14,
  sizeRowInput:18,
  sizeRowPct:10,
  sizeMargin:26,
  sizeMarginLabel:10,
  sizeMax:12,
  sizeAsset:26,
  sizeAssetLabel:10,
  // 背景色
  bgApp:'#111111',
  bgSummary:'#282828',
  bgRow:'#1c1c1c',
  // レイアウト
  summaryTop:12,
  avgOffsetX:-6,
  avgOffsetY:-5,
  qtyOffsetX:-25,
  qtyOffsetY:-5,
  costOffsetY:-5,
  marginLabelGap:5,
  marginLabelOffsetY:-6,
  assetLabelTop:-15,
  dividerMargin:8,
  dividerMarginTop:-5,
  dividerMarginBottom:5,
  colorDivider:'#333338',
  pnlLabelMarginV:-5,
  pnlPctMarginV:-10,
  taxRowMarginV:2,
  afterTaxOffsetY:-3,
  marginOffsetY:-9,
  footerPaddingV:15,
  // 税率・原資産額
  defaultTaxRate:20.315,
  baseAsset:0
};
var cfg={};

function loadCfg(){
  try{
    var s=JSON.parse(localStorage.getItem('kabu_cfg'));
    cfg=Object.assign({},DEFAULTS,s||{});
  }catch(e){cfg=Object.assign({},DEFAULTS);}
}
function saveCfg(){
  try{localStorage.setItem('kabu_cfg',JSON.stringify(cfg));}catch(e){}
}
function applyCfg(){
  // 背景
  document.body.style.background=cfg.bgApp;
  document.getElementById('rows-scroll').style.background=cfg.bgApp;
  // サマリーカード
  var sc=document.getElementById('summary-card');
  sc.style.background=cfg.bgSummary;
  sc.style.border='1px solid '+lighten(cfg.bgSummary,20);
  // サマリー上位置
  document.querySelector('.summary-fixed').style.paddingTop=cfg.summaryTop+'px';
  document.documentElement.style.setProperty('--cost-offset-y',(cfg.costOffsetY||0)+'px');
  var ia=document.getElementById('item-avg');
  var iq=document.getElementById('item-qty');
  var ic=document.getElementById('item-cost');
  if(ia)ia.style.transform='translateY('+(cfg.avgOffsetY||0)+'px) translateX('+(cfg.avgOffsetX||0)+'px)';
  if(iq)iq.style.transform='translateY('+(cfg.qtyOffsetY||0)+'px) translateX('+(cfg.qtyOffsetX||0)+'px)';
  if(ic)ic.style.transform='translateY('+(cfg.costOffsetY||0)+'px)';
  // 余力ラベルとMAX
  document.documentElement.style.setProperty('--margin-label-gap',(cfg.marginLabelGap||5)+'px');
  document.documentElement.style.setProperty('--margin-label-offset-y',(cfg.marginLabelOffsetY||0)+'px');
  var ml=document.getElementById('margin-label');
  if(ml){ml.style.color=cfg.colorMarginLabel;ml.style.fontSize=(cfg.sizeMarginLabel||10)+'px';}
  var mv=document.getElementById('margin-val');
  if(mv){mv.style.color=cfg.colorMargin;mv.style.fontSize=(cfg.sizeMargin||16)+'px';}
  // 資産合計ラベル
  var al=document.getElementById('asset-label');
  if(al){al.style.color=cfg.colorAssetLabel||'#8e8e96';al.style.fontSize=(cfg.sizeAssetLabel||10)+'px';}
  document.documentElement.style.setProperty('--asset-label-top',(cfg.assetLabelTop||-19)+'px');
  // divider余白
  document.documentElement.style.setProperty('--divider-margin-top',(cfg.dividerMarginTop||0)+'px');
  document.documentElement.style.setProperty('--divider-margin-bottom',(cfg.dividerMarginBottom||0)+'px');
  document.documentElement.style.setProperty('--divider-color',cfg.colorDivider||'#333338');
  document.documentElement.style.setProperty('--pnl-label-margin',cfg.pnlLabelMarginV+'px');
  document.documentElement.style.setProperty('--pnl-pct-margin',cfg.pnlPctMarginV+'px');
  document.documentElement.style.setProperty('--tax-row-margin',cfg.taxRowMarginV+'px');
  document.documentElement.style.setProperty('--after-tax-offset-y',(cfg.afterTaxOffsetY||0)+'px');
  document.documentElement.style.setProperty('--margin-offset-y',(cfg.marginOffsetY||0)+'px');

function lighten(hex,amt){
  var n=parseInt(hex.replace('#',''),16);
  var r=Math.min(255,((n>>16)&0xff)+amt);
  var g=Math.min(255,((n>>8)&0xff)+amt);
  var b=Math.min(255,(n&0xff)+amt);
  return'#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}

/* ── フォーマット ── */
function ceilVal(n,d){d=d||0;if(!isFinite(n)||isNaN(n))return null;var f=Math.pow(10,d);return Math.ceil(n*f)/f;}
function fmt(n,d){d=d||0;var v=ceilVal(n,d);if(v===null)return'—';if(Math.abs(v)>=1e8)return(v/1e8).toFixed(2)+'億';return v.toLocaleString('ja-JP',{maximumFractionDigits:d});}
function fmtFull(n,d){d=d||0;var v=ceilVal(n,d);if(v===null)return'—';return v.toLocaleString('ja-JP',{maximumFractionDigits:d});}
function fmtS(n){if(!isFinite(n)||isNaN(n))return'—';return(n>=0?'+':'')+fmtFull(n,0);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ── 計算 ── */
function calcTotals(){
  var cost=0,qty=0,valid=0;
  rows.forEach(function(r){var p=parseFloat(r.price),q=parseFloat(r.qty);if(isFinite(p)&&isFinite(q)&&p>0&&q>0){cost+=p*q;qty+=q;valid++;}});
  return{cost:cost,qty:qty,avg:valid>0&&qty>0?cost/qty:null};
}

function recalc(){
  var t=calcTotals();
  document.getElementById('avg').textContent=t.avg!==null?fmt(t.avg,0):'—';
  document.getElementById('tot-qty').textContent=t.qty>0?fmt(t.qty,0):'—';
  document.getElementById('tot-cost').textContent=t.cost>0?fmt(t.cost,0):'—';
  var base=parseFloat(cfg.baseAsset)||0;
  var costEl=document.getElementById('tot-cost');
  costEl.style.color=(base>0&&t.cost>base)?cfg.colorCostWarn:cfg.colorCost;
  // 余力計算
  var marginEl=document.getElementById('margin-val');
  if(marginEl){
    if(base>0){
      var marginVal=base-t.cost;
      marginEl.textContent=fmtFull(marginVal,0);
      marginEl.style.color=cfg.colorMargin;
      marginEl.style.fontSize=(cfg.sizeMargin||16)+'px';
    }else{
      marginEl.textContent='—';
      marginEl.style.color=cfg.colorMargin;
    }
  }
  // MAX株数（各行に表示）
  var rowItems=document.querySelectorAll('.row-item');
  rowItems.forEach(function(item,i){
    var maxSpan=item.querySelector('.row-max');
    var p=parseFloat(rows[i]&&rows[i].price);
    var marginAmt=(base>0)?(base-t.cost):null;
    if(maxSpan&&marginAmt!==null&&isFinite(p)&&p>0&&marginAmt>0){
      var maxQty=Math.floor(marginAmt/p);
      maxSpan.textContent='MAX '+fmt(maxQty,0);
      maxSpan.style.color=cfg.colorMax;
      maxSpan.style.fontSize=(cfg.sizeMax||10)+'px';
    }else if(maxSpan){
      maxSpan.textContent='';
    }
  });
  var cur=getActivePrice();
  var pnlAmtEl=document.getElementById('pnl-amt');
  var pnlPctEl=document.getElementById('pnl-pct');
  var pnlAfterEl=document.getElementById('pnl-after-tax');
  if(t.avg!==null&&isFinite(cur)&&t.qty>0){
    var pnl=(cur-t.avg)*t.qty;
    var pct=((cur-t.avg)/t.avg)*100;
    pnlAmtEl.textContent=fmtS(pnl);
    pnlAmtEl.style.color=cfg.colorPnl;
    pnlPctEl.textContent=(pnl>=0?'+':'')+fmt(pct,2)+'%';
    var taxOn=document.getElementById('tax-on').checked;
    var taxRate=parseFloat(document.getElementById('tax-rate').value)/100;
    if(taxOn&&isFinite(taxRate)){
      pnlAfterEl.textContent=fmtS(pnl*(1-taxRate));
      if(pnl>0){pnlAfterEl.className='tax-after';pnlAfterEl.style.color=cfg.colorAfterTax;}
      else{pnlAfterEl.className='tax-after';pnlAfterEl.style.color=cfg.colorAfterTaxMinus;}
    }else{pnlAfterEl.textContent='';pnlAfterEl.style.color='';}
  }else{
    pnlAmtEl.textContent='—';
    pnlAmtEl.style.color=cfg.colorPnl;
    pnlPctEl.textContent='';
    pnlAfterEl.textContent='';
  }
  // 資産合計
  var atEl=document.getElementById('asset-total');
  if(atEl){
    var taxOn2=document.getElementById('tax-on').checked;
    var taxRate2=parseFloat(document.getElementById('tax-rate').value)/100;
    var afterTaxVal=null;
    if(t.avg!==null&&isFinite(cur)&&t.qty>0){
      var pnl2=(cur-t.avg)*t.qty;
      if(taxOn2&&isFinite(taxRate2)){afterTaxVal=pnl2*(1-taxRate2);}
      else{afterTaxVal=pnl2;}
    }
    var base=parseFloat(cfg.baseAsset)||0;
    if(afterTaxVal!==null){
      atEl.textContent='¥'+fmtFull(base+afterTaxVal,0);
    }else if(base>0){
      atEl.textContent='¥'+fmtFull(base,0);
    }else{
      atEl.textContent='—';
    }
    atEl.style.color=cfg.colorAsset;
    atEl.style.fontSize=cfg.sizeAsset+'px';
  }
  document.querySelectorAll('.subtotal-val').forEach(function(el,i){
    var p=parseFloat(rows[i]&&rows[i].price),q=parseFloat(rows[i]&&rows[i].qty);
    el.textContent=(isFinite(p)&&isFinite(q)&&p>0&&q>0)?fmt(p*q,0):'—';
  });
  // 各行の%表示
  document.querySelectorAll('.row-pct').forEach(function(el,i){
    var p=parseFloat(rows[i]&&rows[i].price);
    if(isFinite(cur)&&cur>0&&isFinite(p)&&p>0){
      var pct=((p-cur)/cur)*100;
      el.textContent=(pct>=0?'+':'')+pct.toFixed(2)+'%';
      el.style.color=pct>=0?cfg.colorRowPctPlus:cfg.colorRowPctMinus;
      el.style.fontSize=cfg.sizeRowPct+'px';
    }else{
      el.textContent='';
    }
  });
}

function initRowDrag(){
  var list=document.getElementById('rows');
  var dragging=null;
  function getRowItem(el){return el?el.closest('.row-item'):null;}
  function getRowIndex(el){
    var items=Array.from(list.querySelectorAll('.row-item'));
    return items.indexOf(el);
  }
  list.querySelectorAll('.row-drag-handle').forEach(function(handle){
    // マウス
    handle.addEventListener('mousedown',function(e){
      dragging=getRowItem(handle);
      if(dragging)dragging.classList.add('row-dragging');
    });
    // タッチ
    handle.addEventListener('touchstart',function(e){
      dragging=getRowItem(handle);
      if(dragging){dragging.classList.add('row-dragging');e.preventDefault();}
    },{passive:false});
  });
  function onMove(x,y){
    if(!dragging)return;
    list.querySelectorAll('.row-item').forEach(function(c){c.classList.remove('row-drag-over');});
    var el=document.elementFromPoint(x,y);
    var ov=getRowItem(el);
    if(ov&&ov!==dragging)ov.classList.add('row-drag-over');
  }
  function onEnd(x,y){
    if(!dragging)return;
    var el=document.elementFromPoint(x,y);
    var ov=getRowItem(el);
    if(ov&&ov!==dragging){
      var from=getRowIndex(dragging);
      var to=getRowIndex(ov);
      if(from>=0&&to>=0&&from!==to){
        var tmp=rows.splice(from,1)[0];
        rows.splice(to,0,tmp);
        render();return;
      }
    }
    list.querySelectorAll('.row-item').forEach(function(c){c.classList.remove('row-dragging','row-drag-over');});
    dragging=null;
  }
  list.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
  list.addEventListener('mouseup',function(e){onEnd(e.clientX,e.clientY);});
  list.addEventListener('touchmove',function(e){if(dragging){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  list.addEventListener('touchend',function(e){if(dragging){onEnd(e.changedTouches[0].clientX,e.changedTouches[0].clientY);}});
}

function makeInsertBtn(idx){
  var w=document.createElement('div');w.className='insert-btn-wrap';
  var b=document.createElement('button');b.className='insert-btn';b.textContent='＋';
  b.onclick=function(){addRow(idx);};w.appendChild(b);return w;
}
function addRow(idx){
  if(idx===-1||idx>=rows.length)rows.push({price:'',qty:''});
  else rows.splice(idx,0,{price:'',qty:''});
  render();
}
function deleteRow(i){if(rows.length<=1)return;rows.splice(i,1);render();}
function moveRow(i,dir){var j=i+dir;if(j<0||j>=rows.length)return;var tmp=rows[i];rows[i]=rows[j];rows[j]=tmp;render();}

/* ── 保存ダイアログ ── */
function promptSave(){
  document.getElementById('save-name-input').value='';
  document.getElementById('save-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('save-name-input').focus();},100);
}
function closeSaveDialog(){document.getElementById('save-overlay').classList.remove('open');}
function confirmSave(){
  var name=document.getElementById('save-name-input').value.trim()||'パターン '+(getSaved().length+1);
  var t=calcTotals();
  var cur=parseFloat(document.getElementById('current-price').value);
  var tgt=parseFloat(document.getElementById('target-price').value);
  var taxOn=document.getElementById('tax-on').checked;
  var taxRate=parseFloat(document.getElementById('tax-rate').value);
  var activePrice=getActivePrice();
  var pnl=(isFinite(activePrice)&&t.qty>0)?(activePrice-t.avg)*t.qty:null;
  var afterTax=(taxOn&&pnl!==null&&pnl>0&&isFinite(taxRate))?pnl*(1-taxRate/100):null;
  var s=getSaved();
  s.push({id:''+Date.now(),name:name,avg:t.avg,qty:t.qty,cost:t.cost,
    cur:isFinite(cur)?cur:null,
    targetPrice:isFinite(tgt)?tgt:null,
    priceMode:priceMode,
    pnl:pnl,afterTax:afterTax,
    taxOn:taxOn,taxRate:isFinite(taxRate)?taxRate:20.315,
    rows:JSON.parse(JSON.stringify(rows))});
  setSaved(s);setLastSavedId(s[s.length-1].id);closeSaveDialog();showToast('「'+name+'」を保存しました');
}

/* ── 保存データ ── */
var lastSavedId=null;
function setLastSavedId(id){lastSavedId=id;try{localStorage.setItem('sim_last_id',id||'');}catch(e){}}
function getSaved(){try{return JSON.parse(localStorage.getItem('sim_v2')||'[]');}catch(e){return[];}}
function setSaved(s){try{localStorage.setItem('sim_v2',JSON.stringify(s));}catch(e){}}

function overwriteSave(){
  if(!lastSavedId){showToast('上書き先がありません。先に新規保存してください');return;}
  var s=getSaved();var idx=-1;
  for(var i=0;i<s.length;i++){if(s[i].id===lastSavedId){idx=i;break;}}
  if(idx===-1){showToast('上書き先が見つかりません');return;}
  var e=s[idx];
  askConfirm('「'+e.name+'」に上書き保存しますか？',function(){
    var t=calcTotals();
    var cur=parseFloat(document.getElementById('current-price').value);
    var tgt=parseFloat(document.getElementById('target-price').value);
    var taxOn=document.getElementById('tax-on').checked;
    var taxRate=parseFloat(document.getElementById('tax-rate').value);
    var activePrice=getActivePrice();
    var pnl=(isFinite(activePrice)&&t.qty>0)?(activePrice-t.avg)*t.qty:null;
    var afterTax=(taxOn&&pnl!==null&&pnl>0&&isFinite(taxRate))?pnl*(1-taxRate/100):null;
    s[idx]=Object.assign({},s[idx],{avg:t.avg,qty:t.qty,cost:t.cost,
      cur:isFinite(cur)?cur:null,
      targetPrice:isFinite(tgt)?tgt:null,
      priceMode:priceMode,
      pnl:pnl,afterTax:afterTax,
      taxOn:taxOn,taxRate:isFinite(taxRate)?taxRate:20.315,
      rows:JSON.parse(JSON.stringify(rows))});
    setSaved(s);setLastSavedId(lastSavedId);
    showToast('「'+e.name+'」を上書きしました');
  });
}

function revertToLastSaved(){
  if(!lastSavedId){showToast('先に保存してください');return;}
  var s=getSaved();var e=null;
  for(var i=0;i<s.length;i++){if(s[i].id===lastSavedId){e=s[i];break;}}
  if(!e){showToast('保存データが見つかりません');return;}
  askConfirm('「'+e.name+'」の保存時の状態に戻しますか？',function(){
    rows=JSON.parse(JSON.stringify(e.rows));
    document.getElementById('current-price').value=e.cur!==null?e.cur:'';
    if(e.targetPrice!=null)document.getElementById('target-price').value=e.targetPrice;
    if(e.priceMode){priceMode=e.priceMode;document.getElementById('radio-current').checked=(priceMode==='current');document.getElementById('radio-target').checked=(priceMode==='target');}
    document.getElementById('tax-on').checked=!!e.taxOn;
    document.getElementById('tax-rate').value=e.taxRate||20.315;
    render();showToast('「'+e.name+'」に戻しました');
  });
}

function renderSaved(){
  var s=getSaved();
  var el=document.getElementById('saved-list');
  if(!s.length){el.innerHTML='<div class="saved-empty">保存されたパターンがありません</div>';return;}
  el.innerHTML=s.map(function(e){
    return '<div class="saved-card" data-id="'+e.id+'">'
      +'<div class="saved-card-header"><div style="display:flex;align-items:center;min-width:0"><span class="drag-handle">⠿</span><span class="saved-name">'+escHtml(e.name)+'</span></div>'
      +'<div class="saved-actions"><button class="saved-load" onclick="loadSaved(\''+e.id+'\')">読込</button><button class="saved-del" onclick="delSaved(\''+e.id+'\')">×</button></div></div>'
      +'<div class="saved-vals">'
        +'<div class="saved-val-item"><div class="saved-val-label">平均単価</div><div class="saved-val-num">'+fmt(e.avg,0)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">合計数量</div><div class="saved-val-num">'+fmt(e.qty,0)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">損益</div><div class="saved-val-num">'+fmtS(e.pnl)+'</div></div>'
        +'<div class="saved-val-item"><div class="saved-val-label">税引後</div><div class="saved-val-num '+(e.afterTax===null?'':e.afterTax>=0?'loss':'profit')+'">'+(e.afterTax!==null?fmtS(e.afterTax):'—')+'</div></div>'
      +'</div></div>';
  }).join('');
  initDrag();
}

function loadSaved(id){
  var s=getSaved();var e=null;
  for(var i=0;i<s.length;i++){if(s[i].id===id){e=s[i];break;}}
  if(!e)return;
  askConfirm('「'+e.name+'」を読み込みますか？',function(){
    rows=JSON.parse(JSON.stringify(e.rows));
    lastSavedId=e.id;setLastSavedId(e.id);
    document.getElementById('current-price').value=e.cur!==null?e.cur:'';
    if(e.targetPrice!=null)document.getElementById('target-price').value=e.targetPrice;
    if(e.priceMode){priceMode=e.priceMode;document.getElementById('radio-current').checked=(priceMode==='current');document.getElementById('radio-target').checked=(priceMode==='target');}
    document.getElementById('tax-on').checked=!!e.taxOn;
    document.getElementById('tax-rate').value=e.taxRate||20.315;
    render();
    showTab('calc',document.querySelectorAll('.tab')[0]);
    showToast('読み込みました');
  });
}
function delSaved(id){
  askConfirm('このパターンを削除しますか？',function(){
    setSaved(getSaved().filter(function(e){return e.id!==id;}));renderSaved();
  });
}
function clearSaved(){
  askConfirm('全て削除しますか？',function(){setSaved([]);renderSaved();});
}

/* ── ドラッグ ── */
function initDrag(){
  var list=document.getElementById('saved-list');
  var dragging=null;
  list.querySelectorAll('.drag-handle').forEach(function(handle){
    handle.addEventListener('touchstart',onTS,{passive:false});
    handle.addEventListener('mousedown',onMD);
  });
  function onMD(e){
    dragging=e.target.closest('.saved-card');if(!dragging)return;
    dragging.classList.add('dragging');
    document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU);
  }
  function onMM(e){
    if(!dragging)return;
    var t=document.elementFromPoint(e.clientX,e.clientY);var ov=t&&t.closest('.saved-card');
    list.querySelectorAll('.saved-card').forEach(function(c){c.classList.remove('drag-over');});
    if(ov&&ov!==dragging)ov.classList.add('drag-over');
  }
  function onMU(e){
    if(!dragging)return;
    var t=document.elementFromPoint(e.clientX,e.clientY);var ov=t&&t.closest('.saved-card');
    if(ov&&ov!==dragging)moveCard(dragging,ov);
    finish();document.removeEventListener('mousemove',onMM);document.removeEventListener('mouseup',onMU);
  }
  function onTS(e){
    dragging=e.target.closest('.saved-card');if(!dragging)return;
    e.preventDefault();dragging.classList.add('dragging');
    document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE);
  }
  function onTM(e){
    if(!dragging)return;e.preventDefault();
    var tc=e.touches[0];var t=document.elementFromPoint(tc.clientX,tc.clientY);var ov=t&&t.closest('.saved-card');
    list.querySelectorAll('.saved-card').forEach(function(c){c.classList.remove('drag-over');});
    if(ov&&ov!==dragging)ov.classList.add('drag-over');
  }
  function onTE(e){
    if(!dragging)return;
    var tc=e.changedTouches[0];var t=document.elementFromPoint(tc.clientX,tc.clientY);var ov=t&&t.closest('.saved-card');
    if(ov&&ov!==dragging)moveCard(dragging,ov);
    finish();document.removeEventListener('touchmove',onTM);document.removeEventListener('touchend',onTE);
  }
  function moveCard(from,to){
    var s=getSaved();var fi=-1,ti=-1;
    for(var i=0;i<s.length;i++){if(s[i].id===from.dataset.id)fi=i;if(s[i].id===to.dataset.id)ti=i;}
    if(fi===-1||ti===-1)return;
    var item=s.splice(fi,1)[0];s.splice(ti,0,item);setSaved(s);renderSaved();
  }
  function finish(){
    if(dragging)dragging.classList.remove('dragging');
    list.querySelectorAll('.saved-card').forEach(function(c){c.classList.remove('drag-over');});dragging=null;
  }
}

/* ── セッション保存・復元 ── */
function saveSession(){
  try{
    localStorage.setItem('sim_session',JSON.stringify({
      cur:document.getElementById('current-price').value,
      tgt:document.getElementById('target-price').value,
      priceMode:priceMode,
      taxOn:document.getElementById('tax-on').checked,
      taxRate:document.getElementById('tax-rate').value
    }));
  }catch(e){}
}
function loadSession(){
  try{
    var s=JSON.parse(localStorage.getItem('sim_session'));
    if(!s)return;
    if(s.cur)document.getElementById('current-price').value=s.cur;
    if(s.tgt)document.getElementById('target-price').value=s.tgt;
    if(s.priceMode)priceMode=s.priceMode;
    if(s.taxOn!=null)document.getElementById('tax-on').checked=s.taxOn;
    if(s.taxRate)document.getElementById('tax-rate').value=s.taxRate;
  }catch(e){}
}

/* ── Toast ── */
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

/* ── 起動 ── */
loadCfg();
try{var _lid=localStorage.getItem('sim_last_id');if(_lid)lastSavedId=_lid;}catch(e){}
if(lastSavedId){
  try{
    var _s=getSaved();
    for(var _i=0;_i<_s.length;_i++){
      if(_s[_i].id===lastSavedId){
        var _e=_s[_i];
        rows=JSON.parse(JSON.stringify(_e.rows));
        document.getElementById('current-price').value=_e.cur!==null?_e.cur:'';
        if(_e.targetPrice!=null)document.getElementById('target-price').value=_e.targetPrice;
        if(_e.priceMode)priceMode=_e.priceMode;
        document.getElementById('tax-on').checked=!!_e.taxOn;
        document.getElementById('tax-rate').value=_e.taxRate||cfg.defaultTaxRate;
        break;
      }
    }
  }catch(e){}
} else {
  // 保存パターンがない場合はセッションから復元
  loadSession();
}
// ラジオボタンの状態を反映
document.getElementById('radio-current').checked=(priceMode==='current');
document.getElementById('radio-target').checked=(priceMode==='target');
render();

// 入力変更時にセッション自動保存
['current-price','target-price','tax-rate'].forEach(function(id){
  document.getElementById(id).addEventListener('input',saveSession);
});
document.getElementById('tax-on').addEventListener('change',saveSession);
</script>
